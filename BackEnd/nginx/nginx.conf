# =============================================================================
# iMeetPro - Nginx Reverse Proxy Configuration
# =============================================================================
# HTTPS with self-signed certificate on 192.168.48.201
# All API requests routed to appropriate microservice
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$upstream_addr" $request_time';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 500M;
    proxy_read_timeout 300s;
    proxy_connect_timeout 60s;
    proxy_send_timeout 300s;

    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1000;

    # ═══════════════════════════════════════════════════════
    # UPSTREAM DEFINITIONS
    # ═══════════════════════════════════════════════════════
    upstream whiteboard_service {
        server whiteboard-service:8230;
    }
    upstream analytics_service {
        server analytics-service:8231;
    }
    upstream face_auth_service {
        server face-auth-service:8232;
    }
    upstream attendance_service {
        server attendance-service:8233;
    }
    upstream user_service {
        server user-service:8234;
    }
    upstream meeting_core_service {
        server meeting-core-service:8235;
    }
    upstream recording_service {
        server recording-service:8236;
    }
    upstream admin_billing_service {
        server admin-billing-service:8237;
    }

    # ═══════════════════════════════════════════════════════
    # HTTP → HTTPS REDIRECT
    # ═══════════════════════════════════════════════════════
    server {
        listen 80;
        server_name 192.168.48.201 localhost;
        return 301 https://$host$request_uri;
    }

    # ═══════════════════════════════════════════════════════
    # MAIN HTTPS SERVER
    # ═══════════════════════════════════════════════════════
    server {
        listen 443 ssl;
        server_name 192.168.48.201 localhost;

        ssl_certificate     /etc/nginx/ssl/selfsigned.crt;
        ssl_certificate_key /etc/nginx/ssl/selfsigned.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        location = /preflight {
            internal;
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, Accept, Origin" always;
            add_header Access-Control-Max-Age 86400;
            add_header Content-Length 0;
            return 204;
        }

        # ─── Health Checks ───
        location = /api/health {
            proxy_pass http://meeting_core_service;
        }
        location = /service-health {
            proxy_pass http://meeting_core_service;
        }

        # ═══════════════════════════════════════════════════
        # SERVICE 1: WHITEBOARD
        # ═══════════════════════════════════════════════════
        location /api/whiteboard/ {
            proxy_pass http://whiteboard_service;
        }

        # ═══════════════════════════════════════════════════
        # SERVICE 2: ANALYTICS & FEEDBACK
        # ═══════════════════════════════════════════════════
        location /api/analytics/ {
            proxy_pass http://analytics_service;
        }
        location /api/feedback/ {
            proxy_pass http://analytics_service;
        }
        location /api/dashboard/ {
            proxy_pass http://analytics_service;
        }
        location /api/meetings/host/ {
            proxy_pass http://analytics_service;
        }
        location /api/meetings/participant/ {
            proxy_pass http://analytics_service;
        }
        location ~ ^/api/meetings/[^/]+/participants/ {
            proxy_pass http://analytics_service;
        }

        # ═══════════════════════════════════════════════════
        # SERVICE 3: FACE AUTH
        # ═══════════════════════════════════════════════════
        location /api/face/ {
            proxy_pass http://face_auth_service;
            client_max_body_size 50M;
        }
        location /api/user-embeddings/ {
            proxy_pass http://face_auth_service;
        }

        # ═══════════════════════════════════════════════════
        # SERVICE 4: ATTENDANCE
        # ═══════════════════════════════════════════════════
        location /api/attendance/ {
            proxy_pass http://attendance_service;
            client_max_body_size 50M;
        }

        # ═══════════════════════════════════════════════════
        # SERVICE 5: USER
        # ═══════════════════════════════════════════════════
        location /api/auth/ {
            proxy_pass http://user_service;
        }
        location /api/user/ {
            proxy_pass http://user_service;
        }
        location /api/profile-photo/ {
            proxy_pass http://user_service;
            client_max_body_size 20M;
        }
        location /api/user-photo/ {
            proxy_pass http://user_service;
            client_max_body_size 20M;
        }
        location /api/update-photo/ {
            proxy_pass http://user_service;
            client_max_body_size 20M;
        }
        location /api/delete-photo/ {
            proxy_pass http://user_service;
        }
        location /api/user-active-photo/ {
            proxy_pass http://user_service;
        }
        location /api/admin/embedding-stats/ {
            proxy_pass http://user_service;
        }

        # ═══════════════════════════════════════════════════
        # SERVICE 7: RECORDING (BEFORE meeting-core to
        # catch /api/meetings/<id>/start-recording first)
        # ═══════════════════════════════════════════════════
        location /api/stream-recording/ {
            proxy_pass http://recording_service;
            proxy_read_timeout 600s;
            client_max_body_size 500M;
        }
        location /api/videos/ {
            proxy_pass http://recording_service;
            proxy_read_timeout 600s;
            client_max_body_size 500M;
        }
        location /api/recordings/ {
            proxy_pass http://recording_service;
            proxy_read_timeout 600s;
            client_max_body_size 500M;
        }
        location /api/upload-single/ {
            proxy_pass http://recording_service;
            client_max_body_size 500M;
        }
        # Recording start/stop via meetings path
        location ~ ^/api/meetings/[^/]+/(start|stop)-recording$ {
            proxy_pass http://recording_service;
            proxy_read_timeout 600s;
        }

        # ═══════════════════════════════════════════════════
        # SERVICE 6: MEETING CORE (catch-all for meetings)
        # ═══════════════════════════════════════════════════
        location /api/cache-chat/ {
            proxy_pass http://meeting_core_service;
            client_max_body_size 50M;
        }
        location /api/cache-reactions/ {
            proxy_pass http://meeting_core_service;
        }
        location /api/cache-hand-raise/ {
            proxy_pass http://meeting_core_service;
        }
        location /api/notifications/ {
            proxy_pass http://meeting_core_service;
        }
        location /api/participants/ {
            proxy_pass http://meeting_core_service;
        }
        location /api/invitations/ {
            proxy_pass http://meeting_core_service;
        }
        location /api/livekit/ {
            proxy_pass http://meeting_core_service;
            proxy_read_timeout 120s;
        }
        # Meetings catch-all — MUST be last
        location /api/meetings/ {
            proxy_pass http://meeting_core_service;
        }

        # ═══════════════════════════════════════════════════
        # SERVICE 8: ADMIN BILLING
        # ═══════════════════════════════════════════════════
        location /api/auth/super_admin/ {
            proxy_pass http://admin_billing_service;
        }
        location /api/super_admin/ {
            proxy_pass http://admin_billing_service;
        }
        location /api/plan/ {
            proxy_pass http://admin_billing_service;
        }
        location /api/payment/ {
            proxy_pass http://admin_billing_service;
        }
        location /api/subscription/ {
            proxy_pass http://admin_billing_service;
        }
        location /api/company/ {
            proxy_pass http://admin_billing_service;
        }
        location /api/admin/login-history/ {
            proxy_pass http://admin_billing_service;
        }
        location /api/admin/active-sessions/ {
            proxy_pass http://admin_billing_service;
        }
        location /api/admin/login-stats/ {
            proxy_pass http://admin_billing_service;
        }
        location /api/admin/force-logout/ {
            proxy_pass http://admin_billing_service;
        }
        location /api/admin/force-logout-user/ {
            proxy_pass http://admin_billing_service;
        }
        location /api/admin/clear-login-history/ {
            proxy_pass http://admin_billing_service;
        }
        location /api/user/login-history/ {
            proxy_pass http://admin_billing_service;
        }

        # ─── Unmatched API → 404 ───
        location /api/ {
            return 404 '{"error": "API endpoint not found"}';
            add_header Content-Type application/json;
        }

        # ─── Root ───
        location / {
            return 200 '{"message": "iMeetPro API Gateway", "status": "running"}';
            add_header Content-Type application/json;
        }
    }
}