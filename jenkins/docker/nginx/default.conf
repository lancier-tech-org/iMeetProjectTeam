# =============================================================================
# iMeetPro Frontend - Nginx Server Configuration
# File: /etc/nginx/conf.d/default.conf
# =============================================================================
#
# IMPORTANT: Update the proxy_pass URLs to match your backend:
#   - Option A: https://api.lancieretech.com (if using external API domain)
#   - Option B: http://127.0.0.1:8000 (if Django runs on same server)
#   - Option C: http://backend:8000 (if using Docker Compose)
#
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # =========================================================================
    # Body size limit for base64 image uploads (attendance frame analysis)
    # =========================================================================
    client_max_body_size 100M;
    client_body_buffer_size 10M;

    # =========================================================================
    # Health check endpoint
    # =========================================================================
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # =========================================================================
    # Nginx status (for monitoring)
    # =========================================================================
    location /nginx_status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        deny all;
    }

    # =========================================================================
    # Static assets caching (JS, CSS, images, fonts)
    # =========================================================================
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # =========================================================================
    # ATTENDANCE API - Specific location (highest priority for attendance)
    # =========================================================================
    location /api/attendance/ {
        # =====================================================================
        # IMPORTANT: Choose ONE of these proxy_pass options:
        # =====================================================================
        
        # Option A: External API domain (RECOMMENDED for production)
        proxy_pass https://api.lancieretech.com/api/attendance/;
        proxy_set_header Host api.lancieretech.com;
        proxy_ssl_server_name on;
        
        # Option B: Django on localhost (uncomment if Django runs locally)
        # proxy_pass http://127.0.0.1:8000/api/attendance/;
        # proxy_set_header Host $host;
        
        # Option C: Docker Compose (uncomment if using Docker)
        # proxy_pass http://backend:8000/api/attendance/;
        # proxy_set_header Host $host;
        
        # =====================================================================
        # Proxy settings - DO NOT MODIFY
        # =====================================================================
        proxy_http_version 1.1;
        
        # CRITICAL: Preserve HTTP method (POST, GET, PUT, DELETE)
        proxy_method $request_method;
        
        # Headers
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Content-Type $content_type;
        proxy_set_header Content-Length $content_length;
        proxy_set_header Accept "application/json";
        
        # CRITICAL: Don't follow redirects (prevents POST becoming GET)
        proxy_redirect off;
        
        # CRITICAL: Pass request body for POST requests
        proxy_pass_request_body on;
        proxy_pass_request_headers on;
        
        # Extended timeouts for frame analysis (can take time)
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        
        # Buffering for large responses
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        
        # =====================================================================
        # CORS Headers
        # =====================================================================
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,Accept' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
        
        # =====================================================================
        # Handle OPTIONS preflight requests
        # =====================================================================
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,Accept';
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # =========================================================================
    # LIVEKIT API - For LiveKit related endpoints
    # =========================================================================
    location /api/livekit/ {
        # Use same backend as attendance
        proxy_pass https://api.lancieretech.com/api/livekit/;
        proxy_set_header Host api.lancieretech.com;
        proxy_ssl_server_name on;
        
        proxy_http_version 1.1;
        proxy_method $request_method;
        
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Content-Type $content_type;
        proxy_set_header Content-Length $content_length;
        
        proxy_redirect off;
        proxy_pass_request_body on;
        proxy_pass_request_headers on;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # CORS
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
        
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # =========================================================================
    # CACHE APIs - For cache-related endpoints (reactions, hand-raise, etc.)
    # =========================================================================
    location /api/cache- {
        proxy_pass https://api.lancieretech.com;
        proxy_set_header Host api.lancieretech.com;
        proxy_ssl_server_name on;
        
        proxy_http_version 1.1;
        proxy_method $request_method;
        
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Content-Type $content_type;
        proxy_set_header Content-Length $content_length;
        
        proxy_redirect off;
        proxy_pass_request_body on;
        proxy_pass_request_headers on;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # CORS
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
        
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # =========================================================================
    # GENERAL API - All other /api/ requests
    # =========================================================================
    location /api/ {
        # =====================================================================
        # IMPORTANT: Choose ONE of these proxy_pass options:
        # =====================================================================
        
        # Option A: External API domain (RECOMMENDED for production)
        proxy_pass https://api.lancieretech.com/api/;
        proxy_set_header Host api.lancieretech.com;
        proxy_ssl_server_name on;
        
        # Option B: Django on localhost (uncomment if Django runs locally)
        # proxy_pass http://127.0.0.1:8000/api/;
        # proxy_set_header Host $host;
        
        # Option C: Docker Compose (uncomment if using Docker)
        # proxy_pass http://backend:8000/api/;
        # proxy_set_header Host $host;
        
        # =====================================================================
        # Proxy settings
        # =====================================================================
        proxy_http_version 1.1;
        proxy_method $request_method;
        
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Content-Type $content_type;
        proxy_set_header Content-Length $content_length;
        proxy_set_header Accept "application/json";
        
        proxy_redirect off;
        proxy_pass_request_body on;
        proxy_pass_request_headers on;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffering
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        
        # =====================================================================
        # CORS Headers
        # =====================================================================
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,Accept' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
        
        # =====================================================================
        # Handle OPTIONS preflight requests
        # =====================================================================
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,Accept';
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # =========================================================================
    # WebSocket support for LiveKit and real-time features
    # =========================================================================
    location /ws/ {
        # Update to your WebSocket backend
        proxy_pass https://api.lancieretech.com/ws/;
        proxy_set_header Host api.lancieretech.com;
        proxy_ssl_server_name on;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Long timeout for WebSocket connections
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # =========================================================================
    # React Router support - MUST BE LAST (catch-all for frontend routes)
    # =========================================================================
    location / {
        # Try to serve static file, if not found serve index.html (SPA routing)
        try_files $uri $uri/ /index.html;
        
        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        
        # Cache control for HTML (don't cache)
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # =========================================================================
    # Error pages
    # =========================================================================
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}