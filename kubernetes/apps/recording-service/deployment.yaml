# =============================================================================
# iMeetPro Recording Service - Kubernetes Deployment
# =============================================================================
# Separate deployment for long-running recording bots
# No Gunicorn max-requests limit
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: recording-service
  namespace: imeetpro
  labels:
    app: recording-service
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: recording-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: recording-service
    spec:
      # Security context
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      
      containers:
        - name: recording-service
          image: 664418964913.dkr.ecr.ap-south-1.amazonaws.com/imeetpro-prod/recording-service:BUILD_NUMBER
          imagePullPolicy: Always
          
          ports:
            - containerPort: 8080
              protocol: TCP
          
          # ============================================
          # ENVIRONMENT VARIABLES
          # ============================================
          env:
            # Python settings
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
            - name: DJANGO_SETTINGS_MODULE
              value: "SampleDB.settings"
            - name: SERVICE_MODE
              value: "standalone"
            
            # Recording service settings
            - name: RECORDING_SERVICE_PORT
              value: "8080"
            - name: RECORDING_SERVICE_WORKERS
              value: "1"
            
            # Redis Configuration
            - name: REDIS_HOST
              value: "redis.databases.svc.cluster.local"
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_RECORDING_DB
              value: "2"
            
            # Database
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: DB_PASSWORD
            
            # MongoDB
            - name: MONGO_URI
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: MONGO_URI
            
            # AWS Credentials
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: AWS_S3_BUCKET
            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: AWS_REGION
            
            # LiveKit Configuration
            - name: LIVEKIT_URL
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: LIVEKIT_URL
            - name: LIVEKIT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: LIVEKIT_API_KEY
            - name: LIVEKIT_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: LIVEKIT_API_SECRET
            
            # Groq API for transcription
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: GROQ_API_KEY
          
          # ============================================
          # PROBES
          # ============================================
          
          # Startup probe - wait up to 2 minutes
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
            successThreshold: 1
          
          # Liveness probe
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          
          # Readiness probe
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          
          # ============================================
          # RESOURCES
          # ============================================
          resources:
            requests:
              memory: "4Gi"
              cpu: "1000m"
            limits:
              memory: "6Gi"
              cpu: "2000m"
          
          # ============================================
          # VOLUME MOUNTS
          # ============================================
          volumeMounts:
            - name: tmp-volume
              mountPath: /tmp
            - name: app-logs
              mountPath: /app/logs
      
      # ============================================
      # VOLUMES
      # ============================================
      volumes:
        - name: tmp-volume
          emptyDir:
            sizeLimit: 5Gi
        - name: app-logs
          emptyDir:
            sizeLimit: 1Gi
      
      # ============================================
      # POD SETTINGS
      # ============================================
      restartPolicy: Always
      terminationGracePeriodSeconds: 120

---
# =============================================================================
# Service (Internal ClusterIP)
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: recording-service
  namespace: imeetpro
  labels:
    app: recording-service
spec:
  type: ClusterIP
  selector:
    app: recording-service
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP