# =============================================================================
# GPU Workers Deployment for iMeetPro - Production
# =============================================================================
# Prerequisites:
# 1. GPU nodes with nvidia.com/gpu=true label
# 2. NVIDIA Dev1ce Plugin installed:
#    kubectl apply -f https://raw.githubusercontent.com/NVIDIA/k8s-device-plugin/v0.14.1/nvidia-device-plugin.yml
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: gpu-worker
  namespace: imeetpro
  labels:
    app: gpu-worker
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: gpu-worker
  template:
    metadata:
      labels:
        app: gpu-worker
    spec:
      nodeSelector:
        nvidia.com/gpu: "true"
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
      containers:
        - name: gpu-worker
          image: 664418964913.dkr.ecr.ap-south-1.amazonaws.com/imeetpro-prod/gpu-worker:latest
          imagePullPolicy: Always
          command:
            - celery
            - -A
            - SampleDB
            - worker
            - -l
            - INFO
            - -Q
            - gpu_tasks,default
            - --concurrency=2
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secrets
          env:
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: "compute,utility"
            - name: INSIGHTFACE_HOME
              value: /tmp/.insightface
            - name: MPLCONFIGDIR
              value: /tmp/.matplotlib
            - name: FONTCONFIG_PATH
              value: /tmp/.fontconfig
            - name: LOG_DIR
              value: /tmp/logs
          resources:
            requests:
              memory: "4Gi"
              cpu: "2000m"
              ephemeral-storage: "25Gi"
              nvidia.com/gpu: "1"
            limits:
              memory: "8Gi"
              cpu: "4000m"
              ephemeral-storage: "40Gi"
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: models
              mountPath: /app/models
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: tmp
          emptyDir: {}
        - name: models
          emptyDir: {}
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
