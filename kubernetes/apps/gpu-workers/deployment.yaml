# =============================================================================
# GPU Workers Deployment for iMeetPro - Production
# =============================================================================
# Prerequisites:
# 1. GPU nodes with nvidia.com/gpu=true label
# 2. NVIDIA Dev1ce Plugin installed:
#    kubectl apply -f https://raw.githubusercontent.com/NVIDIA/k8s-device-plugin/v0.14.1/nvidia-device-plugin.yml
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: gpu-worker
  namespace: imeetpro
  labels:
    app: gpu-worker
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: gpu-worker
  template:
    metadata:
      labels:
        app: gpu-worker
    spec:
      nodeSelector:
        nvidia.com/gpu: "true"
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
      containers:
        - name: gpu-worker
          image: 664418964913.dkr.ecr.ap-south-1.amazonaws.com/imeetpro-prod/gpu-worker:latest
          imagePullPolicy: Always
          command:
            - celery
            - -A
            - SampleDB
            - worker
            - -l
            - INFO
            - -Q
            - gpu_tasks,default
            - --concurrency=2
          env:
            - name: CELERY_WORKER_TYPE
              value: "worker"
            - name: REDIS_HOST
              value: "redis.databases.svc.cluster.local"
            - name: REDIS_PORT
              value: "6379"
            - name: CELERY_BROKER_URL
              value: "redis://redis.databases.svc.cluster.local:6379/0"
            - name: CELERY_RESULT_BACKEND
              value: "redis://redis.databases.svc.cluster.local:6379/1"
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: "compute,utility"
            - name: INSIGHTFACE_HOME
              value: /tmp/.insightface
            - name: MPLCONFIGDIR
              value: /tmp/.matplotlib
            - name: FONTCONFIG_PATH
              value: /tmp/.fontconfig
            - name: LOG_DIR
              value: /tmp/logs
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: DJANGO_SETTINGS_MODULE
              value: "SampleDB.settings"
            - name: HOME
              value: "/tmp"
            # ============================================
            # CRITICAL: Explicit secrets for AI processing
            # ============================================
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: GROQ_API_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: OPENAI_API_KEY
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: AWS_S3_BUCKET
            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: AWS_REGION
            - name: LIVEKIT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: LIVEKIT_API_KEY
            - name: LIVEKIT_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: LIVEKIT_API_SECRET
            # ============================================
            # MySQL Database Configuration
            # ============================================
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: DB_HOST
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: DB_PASSWORD
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: DB_PORT
          resources:
            requests:
              memory: "4Gi"
              cpu: "2000m"
              ephemeral-storage: "25Gi"
              nvidia.com/gpu: "1"
            limits:
              memory: "8Gi"
              cpu: "4000m"
              ephemeral-storage: "40Gi"
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: models
              mountPath: /app/models
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: tmp
          emptyDir: {}
        - name: models
          emptyDir: {}
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
