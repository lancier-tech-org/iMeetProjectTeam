# =============================================================================
# Celery Worker Deployment for iMeetPro - Production
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  namespace: imeetpro
  labels:
    app: celery-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: celery-worker
  template:
    metadata:
      labels:
        app: celery-worker
    spec:
      containers:
        - name: celery-worker
          image: 664418964913.dkr.ecr.ap-south-1.amazonaws.com/imeetpro-prod/celery-worker:latest
          imagePullPolicy: Always
          command:
            - celery
            - -A
            - SampleDB
            - worker
            - -l
            - INFO
            - --concurrency=4
            - -Q
            - celery
          env:
            # ============================================
            # CRITICAL: Prevent APScheduler from starting
            # ============================================
            - name: CELERY_WORKER_TYPE
              value: "worker"
            
            - name: INSIGHTFACE_HOME
              value: /tmp/.insightface
            - name: MPLCONFIGDIR
              value: /tmp/.matplotlib
            - name: FONTCONFIG_PATH
              value: /tmp/.fontconfig
            - name: LOG_DIR
              value: /tmp/logs
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: DJANGO_SETTINGS_MODULE
              value: "SampleDB.settings"
            - name: HOME
              value: "/tmp"
            
            # ============================================
            # Database Configuration (from ConfigMap)
            # ============================================
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: DB_HOST
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: DB_NAME
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: DB_PORT
            
            # Database Credentials (from Secrets)
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: DB_PASSWORD
            
            # ============================================
            # Redis Configuration (from ConfigMap)
            # ============================================
            - name: CELERY_BROKER_URL
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: CELERY_BROKER_URL
            - name: CELERY_RESULT_BACKEND
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: CELERY_RESULT_BACKEND
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: REDIS_PORT
            
            # ============================================
            # CRITICAL: Explicit secrets for AI processing
            # ============================================
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: GROQ_API_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: OPENAI_API_KEY
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: AWS_S3_BUCKET
            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: AWS_REGION
            - name: LIVEKIT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: LIVEKIT_API_KEY
            - name: LIVEKIT_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: LIVEKIT_API_SECRET
          volumeMounts:              
            - name: tmp              
              mountPath: /tmp       
          resources:
            requests:
              memory: "2Gi"
              cpu: "250m"
            limits:
              memory: "4Gi"
              cpu: "1000m"
      volumes:
        - name: tmp
          emptyDir: {}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
---
# Celery Beat for scheduled tasks
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-beat
  namespace: imeetpro
  labels:
    app: celery-beat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-beat
  template:
    metadata:
      labels:
        app: celery-beat
    spec:
      containers:
        - name: celery-beat
          image: 664418964913.dkr.ecr.ap-south-1.amazonaws.com/imeetpro-prod/celery-worker:latest
          imagePullPolicy: Always
          command:
            - celery
            - -A
            - SampleDB
            - beat
            - -l
            - INFO
            - --schedule=/tmp/celerybeat-schedule
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secrets
          env:
            - name: INSIGHTFACE_HOME
              value: /tmp/.insightface
            - name: MPLCONFIGDIR
              value: /tmp/.matplotlib
            - name: FONTCONFIG_PATH
              value: /tmp/.fontconfig
            - name: LOG_DIR
              value: /tmp/logs
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: DJANGO_SETTINGS_MODULE
              value: "SampleDB.settings"
            - name: HOME
              value: "/tmp"
            - name: DISABLE_SCHEDULER
              value: "true"
            - name: DISABLE_RECORDING_INIT
              value: "true"
            # ============================================
            # CRITICAL: Explicit secrets for transcription
            # ============================================
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: GROQ_API_KEY
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: AWS_S3_BUCKET
            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: AWS_REGION
            - name: LIVEKIT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: LIVEKIT_API_KEY
            - name: LIVEKIT_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: LIVEKIT_API_SECRET

          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              memory: "2Gi"
              cpu: "100m"
            limits:
              memory: "4Gi"
              cpu: "500m"
      volumes:                      
        - name: tmp                 
          emptyDir: {}            
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
