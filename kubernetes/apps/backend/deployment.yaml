# kubernetes/apps/backend/deployment.yaml
# FINAL VERSION - All issues fixed

apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: backend
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: backend
    spec:
      # Security context for non-root user
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      
      containers:
        - name: backend
          image: 664418964913.dkr.ecr.ap-south-1.amazonaws.com/imeetpro-prod/backend:BUILD_NUMBER
          imagePullPolicy: Always
          
          ports:
            - containerPort: 8000
              protocol: TCP
          
          # ============================================
          # COMMAND: Gunicorn with gthread workers
          # ============================================
          command:
            - "gunicorn"
          args:
            - "SampleDB.wsgi:application"
            - "--bind"
            - "0.0.0.0:8000"
            - "--workers"
            - "2"
            - "--worker-class"
            - "gthread"
            - "--threads"
            - "4"
            - "--timeout"
            - "600"
            - "--graceful-timeout"
            - "30"
            - "--keep-alive"
            - "5"
            - "--max-requests"
            - "1000"
            - "--max-requests-jitter"
            - "100"
            - "--log-level"
            - "info"
            - "--access-logfile"
            - "-"
            - "--error-logfile"
            - "-"
          
          # ============================================
          # ENVIRONMENT VARIABLES
          # ============================================
          env:
            # Python/Django settings
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
            - name: DJANGO_SETTINGS_MODULE
              value: "SampleDB.settings"
            
            # Temp directories for ML models
            - name: HOME
              value: "/tmp"
            - name: MPLCONFIGDIR
              value: "/tmp/.matplotlib"
            - name: INSIGHTFACE_HOME
              value: "/tmp/.insightface"
            - name: TRANSFORMERS_CACHE
              value: "/tmp/.transformers"
            - name: HF_HOME
              value: "/tmp/.huggingface"
            - name: XDG_CACHE_HOME
              value: "/tmp/.cache"
            - name: NUMBA_CACHE_DIR
              value: "/tmp/.numba"
            
            # Redis Configuration - K8s compatible
            - name: DEFAULT_REDIS_HOST
              value: "redis.databases.svc.cluster.local"
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_DB
              value: "0"
            
            # Database - from ConfigMap/Secret
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: DB_HOST
                  optional: true
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: DB_PORT
                  optional: true
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: DB_NAME
                  optional: true
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: DB_USER
                  optional: true
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: DB_PASSWORD
                  optional: true
            
            # LiveKit Configuration
            - name: LIVEKIT_URL
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: LIVEKIT_URL
                  optional: true
            - name: LIVEKIT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: LIVEKIT_API_KEY
                  optional: true
            - name: LIVEKIT_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: LIVEKIT_API_SECRET
                  optional: true
            
            # Disable background schedulers during startup
            - name: DISABLE_SCHEDULER
              value: "true"
            - name: DISABLE_CRON
              value: "true"
          
          # ============================================
          # PROBES - TCP based (NOT HTTP)
          # ML models block HTTP during first request
          # ============================================
          
          # Startup Probe: Wait for app to be ready (up to 10 minutes)
          startupProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60
            successThreshold: 1
          
          # Liveness Probe: Check if app is alive
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          
          # Readiness Probe: Check if app can accept traffic
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          
          # ============================================
          # RESOURCES
          # ============================================
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          
          # ============================================
          # VOLUME MOUNTS
          # ============================================
          volumeMounts:
            - name: tmp-volume
              mountPath: /tmp
            - name: app-logs
              mountPath: /app/logs
      
      # ============================================
      # VOLUMES
      # ============================================
      volumes:
        - name: tmp-volume
          emptyDir:
            sizeLimit: 2Gi
        - name: app-logs
          emptyDir:
            sizeLimit: 500Mi
      
      # ============================================
      # POD SETTINGS
      # ============================================
      restartPolicy: Always
      terminationGracePeriodSeconds: 60
      
      # Optional: Node affinity/tolerations if needed
      # nodeSelector:
      #   node-type: application

---
# ============================================
# SERVICE
# ============================================
apiVersion: v1
kind: Service
metadata:
  name: backend
  labels:
    app: backend
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP

---
# ============================================
# CONFIGMAP (Optional - create if not exists)
# ============================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
data:
  DB_HOST: "your-db-host.rds.amazonaws.com"
  DB_PORT: "3306"
  DB_NAME: "imeetpro"
  LIVEKIT_URL: "wss://your-livekit-server.com"

---
# ============================================
# SECRET (Optional - create if not exists)
# ============================================
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
type: Opaque
stringData:
  DB_USER: "your_db_user"
  DB_PASSWORD: "your_db_password"
  LIVEKIT_API_KEY: "your_api_key"
  LIVEKIT_API_SECRET: "your_api_secret"
