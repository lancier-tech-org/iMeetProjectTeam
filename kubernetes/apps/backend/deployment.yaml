# =============================================================================
# iMeetPro Backend Deployment - Production (FIXED)
# File: kubernetes/apps/backend/deployment.yaml
# =============================================================================
# FIXED:
#   - HTTP health probes instead of TCP
#   - Session affinity for consistent routing
#   - Init container to wait for Redis
#   - Increased resources for ML stability
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: imeetpro
  labels:
    app: backend
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: backend
    spec:
      # Security context for non-root user
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      
      # FIXED: Wait for Redis before starting backend
      initContainers:
        - name: wait-for-redis
          image: busybox:1.35
          command: ['sh', '-c', 'until nc -z redis.databases.svc.cluster.local 6379; do echo waiting for redis; sleep 2; done']
      
      containers:
        - name: backend
          image: 664418964913.dkr.ecr.ap-south-1.amazonaws.com/imeetpro-prod/backend:BUILD_NUMBER
          imagePullPolicy: Always
          
          ports:
            - containerPort: 8000
              protocol: TCP
          
          # ============================================
          # COMMAND: Gunicorn with gthread workers
          # ============================================
          command:
            - "gunicorn"
          args:
            - "SampleDB.wsgi:application"
            - "--bind"
            - "0.0.0.0:8000"
            - "--workers"
            - "2"
            - "--worker-class"
            - "gthread"
            - "--threads"
            - "4"
            - "--timeout"
            - "600"
            - "--graceful-timeout"
            - "30"
            - "--keep-alive"
            - "5"
            - "--max-requests"
            - "1000"
            - "--max-requests-jitter"
            - "100"
            - "--log-level"
            - "info"
            - "--access-logfile"
            - "-"
            - "--error-logfile"
            - "-"
          
          # ============================================
          # ENVIRONMENT VARIABLES
          # ============================================
          env:
            # Python/Django settings
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
            - name: DJANGO_SETTINGS_MODULE
              value: "SampleDB.settings"
            
            # FIXED: Pod identity for debugging
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            
            # Temp directories for ML models
            - name: HOME
              value: "/tmp"
            - name: MPLCONFIGDIR
              value: "/tmp/.matplotlib"
            - name: INSIGHTFACE_HOME
              value: "/tmp/.insightface"
            - name: TRANSFORMERS_CACHE
              value: "/tmp/.transformers"
            - name: HF_HOME
              value: "/tmp/.huggingface"
            - name: XDG_CACHE_HOME
              value: "/tmp/.cache"
            - name: NUMBA_CACHE_DIR
              value: "/tmp/.numba"
            
            # Redis Configuration
            - name: DEFAULT_REDIS_HOST
              value: "redis.databases.svc.cluster.local"
            - name: REDIS_HOST
              value: "redis.databases.svc.cluster.local"
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_DB
              value: "0"
            - name: REDIS_URL
              value: "redis://redis.databases.svc.cluster.local:6379/0"
            
            # FIXED: Attendance session Redis DB
            - name: ATTENDANCE_REDIS_DB
              value: "2"
            
            # Database - from ConfigMap/Secret
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: DB_HOST
                  optional: true
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: DB_PORT
                  optional: true
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: DB_NAME
                  optional: true
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: DB_USER
                  optional: true
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: DB_PASSWORD
                  optional: true
            
            # MongoDB Configuration
            - name: MONGO_URI
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: MONGO_URI
                  optional: true
            
            # AWS Credentials
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: AWS_ACCESS_KEY_ID
                  optional: true
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: AWS_SECRET_ACCESS_KEY
                  optional: true
            - name: AWS_S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: AWS_S3_BUCKET
                  optional: true
            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: AWS_REGION
                  optional: true
            
            # LiveKit Configuration
            - name: LIVEKIT_URL
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: LIVEKIT_URL
                  optional: true
            - name: LIVEKIT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: LIVEKIT_API_KEY
                  optional: true
            - name: LIVEKIT_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: LIVEKIT_API_SECRET
                  optional: true
            
            # Groq API Key
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: GROQ_API_KEY
                  optional: true
            
            # Disable background schedulers during startup
            - name: DISABLE_SCHEDULER
              value: "true"
            - name: DISABLE_CRON
              value: "true"
          
          # ============================================
          # PROBES - FIXED: HTTP probes for accurate health
          # ============================================
          
          # Startup Probe: Wait for app to be ready (up to 15 minutes)
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 90
            successThreshold: 1
          
          # Liveness Probe: Check if app is alive
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
            successThreshold: 1
          
          # Readiness Probe: Check if app can accept traffic
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
            successThreshold: 1
          
          # ============================================
          # RESOURCES - Increased for ML stability
          # ============================================
          resources:
            requests:
              memory: "2Gi"
              cpu: "500m"
            limits:
              memory: "6Gi"
              cpu: "2000m"
          
          # ============================================
          # VOLUME MOUNTS
          # ============================================
          volumeMounts:
            - name: tmp-volume
              mountPath: /tmp
            - name: app-logs
              mountPath: /app/logs
      
      # ============================================
      # VOLUMES
      # ============================================
      volumes:
        - name: tmp-volume
          emptyDir:
            sizeLimit: 4Gi
        - name: app-logs
          emptyDir:
            sizeLimit: 500Mi
      
      # ============================================
      # POD SETTINGS
      # ============================================
      restartPolicy: Always
      terminationGracePeriodSeconds: 60

---
# ============================================
# SERVICE - FIXED: Added session affinity
# ============================================
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: imeetpro
  labels:
    app: backend
spec:
  type: ClusterIP
  # FIXED: Session affinity ensures same user goes to same pod
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600
  selector:
    app: backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
