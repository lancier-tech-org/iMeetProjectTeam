# =============================================================================
# iMeetPro Backend Deployment - Production (FIXED for ML Model Loading)
# =============================================================================
# FIXES APPLIED:
#   - Added explicit gunicorn command with SampleDB.wsgi
#   - Single worker with 600s timeout for ML model loading
#   - Increased startup probe timing (10 mins total allowed)
#   - Proper liveness/readiness probes after app is ready
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: imeetpro
  labels:
    app: backend
    version: v1
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: backend
        version: v1
        tier: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: imeetpro-sa

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: backend

      containers:
        - name: backend
          image: 664418964913.dkr.ecr.ap-south-1.amazonaws.com/imeetpro-prod/backend:latest
          imagePullPolicy: Always

          # =====================================================
          # CRITICAL FIX: Direct gunicorn command (bypasses entrypoint)
          # Single worker + long timeout for ML model loading
          # =====================================================
          command: ["gunicorn"]
          args:
            - "SampleDB.wsgi:application"
            - "--bind"
            - "0.0.0.0:8000"
            - "--workers"
            - "2"
            - "--timeout"
            - "600"
            - "--graceful-timeout"
            - "300"
            - "--keep-alive"
            - "5"
            - "--log-level"
            - "info"
            - "--access-logfile"
            - "-"
            - "--error-logfile"
            - "-"

          ports:
            - name: http
              containerPort: 8000
              protocol: TCP

          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secrets

          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: LOG_DIR
              value: "/tmp/logs"
            - name: CELERY_LOG_PATH
              value: "/tmp/logs/celery.log"
            - name: AWS_STORAGE_BUCKET_NAME
              value: "imeetpro-prod-recordings"
            - name: MONGO_URI
              value: "mongodb://mongodb.databases.svc.cluster.local:27017/imeetpro"
            - name: INSIGHTFACE_HOME
              value: "/tmp/.insightface"
            - name: HOME
              value: "/tmp"
            - name: MPLCONFIGDIR
              value: "/tmp/.matplotlib"
            - name: AWS_S3_BUCKET
              value: "imeetpro-prod-recordings"
            - name: MONGO_DB
              value: "imeetpro"
            - name: LIVEKIT_API_URL
              value: "https://imeetpro-fbrcr2mk.livekit.cloud"
            - name: CACHE_HAND_RAISE_HOST
              value: "redis.databases.svc.cluster.local"
            - name: CACHE_CHAT_HOST
              value: "redis.databases.svc.cluster.local"
            - name: DEFAULT_REDIS_HOST
              value: "redis.databases.svc.cluster.local"
            - name: CACHE_REACTIONS_HOST
              value: "redis.databases.svc.cluster.local"
            - name: LIVEKIT_URL
              value: "wss://imeetpro-fbrcr2mk.livekit.cloud"
            - name: LIVEKIT_WSS_URL
              value: "wss://imeetpro-fbrcr2mk.livekit.cloud"
            # Disable scheduler during startup to speed up loading
            - name: DISABLE_SCHEDULER
              value: "false"

          resources:
            requests:
              memory: "4Gi"
              cpu: "1000m"
            limits:
              memory: "8Gi"
              cpu: "4000m"

          # =====================================================
          # STARTUP PROBE: Allows 10 minutes for ML models to load
          # initialDelay(120s) + period(15s) * threshold(40) = 720s = 12 mins
          # =====================================================
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 40
            successThreshold: 1

          # =====================================================
          # READINESS PROBE: After startup, check every 15s
          # =====================================================
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
            successThreshold: 1

          # =====================================================
          # LIVENESS PROBE: After startup, check every 30s
          # =====================================================
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
            successThreshold: 1

          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 2Gi

      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

      terminationGracePeriodSeconds: 120

      tolerations:
        - key: "node.kubernetes.io/not-ready"
          operator: "Exists"
          effect: "NoExecute"
          tolerationSeconds: 300
        - key: "node.kubernetes.io/unreachable"
          operator: "Exists"
          effect: "NoExecute"
          tolerationSeconds: 300

---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: imeetpro
  labels:
    app: backend
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
  selector:
    app: backend

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: imeetpro
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: backend-pdb
  namespace: imeetpro
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: backend
