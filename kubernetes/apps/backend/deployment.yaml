# =============================================================================
# iMeetPro Backend Deployment - Production (FINAL UPDATED)
# =============================================================================
# Updated: 2026-02-01
# Changes:
#   - Memory limits increased: 2Gi → 4Gi (for face model loading)
#   - Memory requests increased: 512Mi → 2Gi
#   - Added AWS credentials env vars (for S3 uploads)
#   - Added MONGO_URI env var
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: imeetpro
  labels:
    app: backend
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 2
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: backend
    spec:
      # Security context for non-root user
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      
      containers:
        - name: backend
          image: 664418964913.dkr.ecr.ap-south-1.amazonaws.com/imeetpro-prod/backend:BUILD_NUMBER
          imagePullPolicy: Always
          
          ports:
            - containerPort: 8000
              protocol: TCP
          
          # ============================================
          # COMMAND: Gunicorn with gthread workers
          # ============================================
          command:
            - "gunicorn"
          args:
            - "SampleDB.wsgi:application"
            - "--bind"
            - "0.0.0.0:8000"
            - "--workers"
            - "2"
            - "--worker-class"
            - "gthread"
            - "--threads"
            - "4"
            - "--timeout"
            - "600"
            - "--graceful-timeout"
            - "30"
            - "--keep-alive"
            - "5"
            - "--max-requests"
            - "1000"
            - "--max-requests-jitter"
            - "100"
            - "--log-level"
            - "info"
            - "--access-logfile"
            - "-"
            - "--error-logfile"
            - "-"
          
          # ============================================
          # ENVIRONMENT VARIABLES
          # ============================================
          env:
            # Python/Django settings
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
            - name: DJANGO_SETTINGS_MODULE
              value: "SampleDB.settings"
            
            # Temp directories for ML models
            - name: HOME
              value: "/tmp"
            - name: MPLCONFIGDIR
              value: "/tmp/.matplotlib"
            - name: INSIGHTFACE_HOME
              value: "/tmp/.insightface"
            - name: TRANSFORMERS_CACHE
              value: "/tmp/.transformers"
            - name: HF_HOME
              value: "/tmp/.huggingface"
            - name: XDG_CACHE_HOME
              value: "/tmp/.cache"
            - name: NUMBA_CACHE_DIR
              value: "/tmp/.numba"
            
            # Redis Configuration - K8s compatible
            - name: DEFAULT_REDIS_HOST
              value: "redis.databases.svc.cluster.local"
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_DB
              value: "0"
            
            # Database - from ConfigMap/Secret
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: DB_HOST
                  optional: true
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: DB_PORT
                  optional: true
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: DB_NAME
                  optional: true
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: DB_USER
                  optional: true
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: DB_PASSWORD
                  optional: true
            
            # MongoDB Configuration - from ConfigMap
            - name: MONGO_URI
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: MONGO_URI
                  optional: true
            
            # AWS Credentials - from Secret (for S3 uploads)
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: AWS_ACCESS_KEY_ID
                  optional: true
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: AWS_SECRET_ACCESS_KEY
                  optional: true
            - name: AWS_S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: AWS_S3_BUCKET
                  optional: true
            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: AWS_REGION
                  optional: true
            
            # LiveKit Configuration
            - name: LIVEKIT_URL
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: LIVEKIT_URL
                  optional: true
            - name: LIVEKIT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: LIVEKIT_API_KEY
                  optional: true
            - name: LIVEKIT_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: LIVEKIT_API_SECRET
                  optional: true
            # Groq API Key for transcription
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: GROQ_API_KEY
                  optional: true
            
            # OpenAI API Key (fallback)
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: OPENAI_API_KEY
                  optional: true
            
            # Recording Service URL
            - name: RECORDING_SERVICE_URL
              value: "http://recording-service.imeetpro.svc.cluster.local:8080"
            
            # ============================================
            # EMAIL CONFIGURATION
            # ============================================
            - name: EMAIL_HOST
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: EMAIL_HOST
                  optional: true
            - name: EMAIL_PORT
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: EMAIL_PORT
                  optional: true
            - name: EMAIL_USE_TLS
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: EMAIL_USE_TLS
                  optional: true
            - name: EMAIL_HOST_USER
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: EMAIL_HOST_USER
                  optional: true
            - name: EMAIL_HOST_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: EMAIL_HOST_PASSWORD
                  optional: true
            - name: DEFAULT_FROM_EMAIL
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: DEFAULT_FROM_EMAIL
                  optional: true
            - name: ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: ADMIN_EMAIL
                  optional: true

            # Disable background schedulers during startup
            - name: DISABLE_SCHEDULER
              value: "true"
            - name: DISABLE_CRON
              value: "true"
          
          # ============================================
          # PROBES - TCP based (NOT HTTP)
          # ML models block HTTP during first request
          # ============================================
          
          # Startup Probe: Wait for app to be ready (up to 10 minutes)
          startupProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60
            successThreshold: 1
          
          # Liveness Probe: Check if app is alive
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          
          # Readiness Probe: Check if app can accept traffic
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          
          # ============================================
          # RESOURCES - UPDATED for ML model loading
          # ============================================
          resources:
            requests:
              memory: "2Gi"
              cpu: "250m"
            limits:
              memory: "4Gi"
              cpu: "1000m"
          
          # ============================================
          # VOLUME MOUNTS
          # ============================================
          volumeMounts:
            - name: tmp-volume
              mountPath: /tmp
            - name: app-logs
              mountPath: /app/logs
      
      # ============================================
      # VOLUMES
      # ============================================
      volumes:
        - name: tmp-volume
          emptyDir:
            sizeLimit: 2Gi
        - name: app-logs
          emptyDir:
            sizeLimit: 500Mi
      
      # ============================================
      # POD SETTINGS
      # ============================================
      restartPolicy: Always
      terminationGracePeriodSeconds: 60

---
# ============================================
# SERVICE
# ============================================
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: imeetpro
  labels:
    app: backend
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP




