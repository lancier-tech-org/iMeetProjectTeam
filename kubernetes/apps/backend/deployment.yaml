# =============================================================================
# iMeetPro Backend Deployment - Production (Rootless + Log Fix)
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: imeetpro
  labels:
    app: backend
    version: v1
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: backend
        version: v1
        tier: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: imeetpro-sa

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: backend

      containers:
        - name: backend
          image: 664418964913.dkr.ecr.ap-south-1.amazonaws.com/imeetpro-prod/backend:149
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 8000
              protocol: TCP

          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secrets

          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            # 👇 New env var tells Django/Celery/Gunicorn where to write logs
            - name: LOG_DIR
              value: "/tmp/logs"
            - name: CELERY_LOG_PATH
              value: "/tmp/logs/celery.log"
            - name: AWS_STORAGE_BUCKET_NAME
              value: "imeetpro-prod-recordings"
            - name: MONGO_URI
              value: "mongodb://mongodb.databases.svc.cluster.local:27017/imeetpro"
            - name: INSIGHTFACE_HOME
              value: "/tmp/.insightface"
            - name: HOME
              value: "/tmp"
            - name: MPLCONFIGDIR
              value: "/tmp/.matplotlib"
            - name: AWS_S3_BUCKET
              value: "imeetpro-prod-recordings"
            - name: MONGO_DB
              value: "imeetpro"
            - name: LIVEKIT_API_URL
              value: "https://imeetpro-fbrcr2mk.livekit.cloud"
            - name: CACHE_HAND_RAISE_HOST
              value: "redis.databases.svc.cluster.local"
            - name: CACHE_CHAT_HOST
              value: "redis.databases.svc.cluster.local"
            - name: DEFAULT_REDIS_HOST
              value: "redis.databases.svc.cluster.local"
            - name: CACHE_REACTIONS_HOST
              value: "redis.databases.svc.cluster.local"
            - name: LIVEKIT_URL
              value: "wss://imeetpro-fbrcr2mk.livekit.cloud"
            - name: LIVEKIT_WSS_URL
              value: "wss://imeetpro-fbrcr2mk.livekit.cloud"

          resources:
            requests:
              memory: "4Gi"
              cpu: "1000m"
            limits:
              memory: "8Gi"
              cpu: "4000m"

          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 40
            successThreshold: 1

          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 90
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
            successThreshold: 1

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
            successThreshold: 1

          volumeMounts:
            - name: tmp
              mountPath: /tmp     # ✅ writable for logs and tmp files

      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 2Gi

      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

      terminationGracePeriodSeconds: 60

      tolerations:
        - key: "node.kubernetes.io/not-ready"
          operator: "Exists"
          effect: "NoExecute"
          tolerationSeconds: 300
        - key: "node.kubernetes.io/unreachable"
          operator: "Exists"
          effect: "NoExecute"
          tolerationSeconds: 300

---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: imeetpro
  labels:
    app: backend
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
  selector:
    app: backend

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: imeetpro
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: backend-pdb
  namespace: imeetpro
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: backend
