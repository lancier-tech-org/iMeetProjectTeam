# =============================================================================
# iMeetPro Backend ConfigMap - Production (FINAL)
# =============================================================================
# Updated: 2026-02-01
# Changes: DB_HOST updated to AWS RDS
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: imeetpro
data:
  # Django Settings
  DEBUG: "False"
  DJANGO_SETTINGS_MODULE: "SampleDB.settings"
  ALLOWED_HOSTS: "*"
  LOG_TO_CONSOLE_ONLY: "true"
  
  # MySQL Database (AWS RDS - Production)
  DB_HOST: "imeetpro-prod-mysql.c7ae8ge8ixhl.ap-south-1.rds.amazonaws.com"
  DB_NAME: "imeetpro"
  DB_PORT: "3306"
  
  # MongoDB Configuration
  MONGODB_HOST: "mongodb.databases.svc.cluster.local"
  MONGODB_PORT: "27017"
  MONGODB_DATABASE: "connectlydb"
  MONGO_URI: "mongodb://mongodb.databases.svc.cluster.local:27017/connectlydb"
  
  # Redis Configuration - All services use same Redis
  REDIS_HOST: "redis.databases.svc.cluster.local"
  REDIS_PORT: "6379"
  REDIS_URL: "redis://redis.databases.svc.cluster.local:6379"
  DEFAULT_REDIS_HOST: "redis.databases.svc.cluster.local"
  CACHE_CHAT_HOST: "redis.databases.svc.cluster.local"
  CACHE_HAND_RAISE_HOST: "redis.databases.svc.cluster.local"
  CACHE_REACTIONS_HOST: "redis.databases.svc.cluster.local"
  WHITEBOARD_REDIS_HOST: "redis.databases.svc.cluster.local"
  RECORDING_REDIS_HOST: "redis.databases.svc.cluster.local"
  
  # Celery Configuration
  CELERY_BROKER_URL: "redis://redis.databases.svc.cluster.local:6379/0"
  CELERY_RESULT_BACKEND: "redis://redis.databases.svc.cluster.local:6379/1"
  
  # AWS Configuration
  AWS_S3_REGION_NAME: "ap-south-1"
  AWS_STORAGE_BUCKET_NAME: "imeetpro-prod-recordings"
  
  # LiveKit Configuration
  LIVEKIT_URL: "wss://imeetpro-7yq8bbet.livekit.cloud"
  LIVEKIT_WSS_URL: "wss://imeetpro-7yq8bbet.livekit.cloud"
  LIVEKIT_TTL: "86400"



