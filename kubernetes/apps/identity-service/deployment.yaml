# =============================================================================
# FILE 4 OF 7: deployment.yaml (Identity Service)
# =============================================================================
# Location: kubernetes/apps/identity-service/deployment.yaml  (CREATE NEW FILE)
#
# Purpose: Kubernetes deployment for dedicated Identity Verification GPU pod.
#          Gets its OWN GPU (nvidia.com/gpu: 1) separate from gpu-worker.
#          HPA already exists in hpa.yaml (identity-service-hpa).
#
# GPU Allocation:
#   gpu-worker pod       → GPU 1 (queue: gpu_tasks)       ← UNCHANGED
#   identity-service pod → GPU 2 (queue: identity_gpu_tasks) ← THIS FILE
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
  namespace: imeetpro
  labels:
    app: identity-service
    gpu-workload: identity-verification
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: identity-service
  template:
    metadata:
      labels:
        app: identity-service
        gpu-workload: identity-verification
    spec:
      # ==============================================
      # GPU Node Selection — same as gpu-worker
      # Kubernetes will schedule this on a GPU node
      # with an AVAILABLE GPU (not the one gpu-worker uses)
      # ==============================================
      nodeSelector:
        nvidia.com/gpu: "true"
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"

      containers:
        - name: identity-service
          image: 664418964913.dkr.ecr.ap-south-1.amazonaws.com/imeetpro-prod/identity-service:latest
          imagePullPolicy: Always

          # ==============================================
          # CRITICAL: Listens ONLY on identity_gpu_tasks
          # NOT on gpu_tasks (that's for gpu-worker)
          # ==============================================
          command:
            - celery
            - -A
            - SampleDB
            - worker
            - -l
            - INFO
            - -Q
            - identity_gpu_tasks
            - --concurrency=2
            - --hostname=identity-worker@%h

          env:
            # ----- Worker Identification -----
            - name: CELERY_WORKER_TYPE
              value: "identity"

            # ----- Redis / Celery -----
            - name: REDIS_HOST
              value: "redis.databases.svc.cluster.local"
            - name: REDIS_PORT
              value: "6379"
            - name: CELERY_BROKER_URL
              value: "redis://redis.databases.svc.cluster.local:6379/0"
            - name: CELERY_RESULT_BACKEND
              value: "redis://redis.databases.svc.cluster.local:6379/1"

            # ----- GPU / NVIDIA -----
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: "compute,utility"

            # ----- InsightFace / ML -----
            - name: INSIGHTFACE_HOME
              value: /tmp/.insightface
            - name: MPLCONFIGDIR
              value: /tmp/.matplotlib
            - name: FONTCONFIG_PATH
              value: /tmp/.fontconfig

            # ----- Django -----
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: DJANGO_SETTINGS_MODULE
              value: "SampleDB.settings"
            - name: HOME
              value: "/tmp"
            - name: LOG_DIR
              value: /tmp/logs

            # ----- AWS (for S3 profile photos) -----
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: AWS_S3_BUCKET
            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: AWS_REGION

            # ----- Database -----
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: DB_HOST
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: DB_PASSWORD
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: DB_PORT

            # ----- MongoDB (for face embeddings) -----
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: MONGO_URI
            - name: MONGO_DB
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: MONGO_DB

          # ==============================================
          # RESOURCES — Dedicated GPU (separate from gpu-worker)
          # ==============================================
          resources:
            requests:
              memory: "4Gi"
              cpu: "2000m"
              ephemeral-storage: "25Gi"
              nvidia.com/gpu: "1"
            limits:
              memory: "8Gi"
              cpu: "4000m"
              ephemeral-storage: "40Gi"
              nvidia.com/gpu: "1"

          # ==============================================
          # VOLUME MOUNTS
          # ==============================================
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: models
              mountPath: /app/models
            - name: dshm
              mountPath: /dev/shm

      # ==============================================
      # VOLUMES
      # ==============================================
      volumes:
        - name: tmp
          emptyDir: {}
        - name: models
          emptyDir: {}
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi

      # ==============================================
      # SECURITY
      # ==============================================
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000