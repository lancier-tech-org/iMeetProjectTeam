# =============================================================================
# iMeetPro Ingress Configuration - Production (UPDATED FOR MICROSERVICE SPLIT)
# =============================================================================
# Updated: 2026-02-09
# Changes:
#   - NEW: api.lancieretech.com /api/face/* routes → identity-service:8220
#   - Everything else UNCHANGED
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: imeetpro-ingress
  namespace: imeetpro
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/websocket-services: "backend"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - www.lancieretech.com
        - api.lancieretech.com
      secretName: imeetpro-tls
  rules:
    # Frontend (UNCHANGED)
    - host: www.lancieretech.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80

    # Backend API (UPDATED — added identity-service routes)
    - host: api.lancieretech.com
      http:
        paths:
          # ============================================
          # NEW: Identity Service routes (Service 2 — GPU)
          # These paths route to identity-service:8220
          # MUST be listed BEFORE the catch-all backend route
          # ============================================
          - path: /api/face/verify
            pathType: Prefix
            backend:
              service:
                name: identity-service
                port:
                  number: 8220
          - path: /api/face/continuous-verify
            pathType: Prefix
            backend:
              service:
                name: identity-service
                port:
                  number: 8220
          - path: /api/face/identity-check
            pathType: Prefix
            backend:
              service:
                name: identity-service
                port:
                  number: 8220
          - path: /api/face/rejoin
            pathType: Prefix
            backend:
              service:
                name: identity-service
                port:
                  number: 8220
          - path: /api/face/session
            pathType: Prefix
            backend:
              service:
                name: identity-service
                port:
                  number: 8220
          - path: /api/health
            pathType: Exact
            backend:
              service:
                name: identity-service
                port:
                  number: 8220
          - path: /api/user
            pathType: Prefix
            backend:
              service:
                name: identity-service
                port:
                  number: 8220
          - path: /api/stats
            pathType: Exact
            backend:
              service:
                name: identity-service
                port:
                  number: 8220

          # ============================================
          # Backend API catch-all (UNCHANGED)
          # All other /api/* routes go to backend:8000
          # ============================================
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000

---
# ClusterIssuer for Let's Encrypt SSL Certificates (UNCHANGED)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: akhil@lancieretech.com
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
      - http01:
          ingress:
            class: nginx